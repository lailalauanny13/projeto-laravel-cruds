version: '3.8'

services:
  app:
    build: .
    container_name: larpintmax_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_DATABASE=sistema_vendas
      - DB_USERNAME=root
      - DB_PASSWORD=root123

  db:
    image: mysql:8.0
    container_name: larpintmax_db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sistema_vendas
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: